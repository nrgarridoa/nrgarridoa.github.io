- company: "Gold Fields La Cima – Tawa Perú S.A.C."
  logo: "/assets/cv/logos/tawa.jpg"
  location: "Hualgayoc, Perú"
  positions:
    - title: "Supervisor de topografía"
      start: "set 2023"
      end: "feb 2024"
      description: "Supervisión del área de topografía en Servicios Técnicos de Gold Fields – Cerro Corona. Control topográfico completo de la operación: cubicación, conciliación de voladura, actualización diaria de topografía y soporte a múltiples áreas (planeamiento, operaciones, geología, grade control, geotecnia y planta)."
      responsibilities:
        - "Liderar y supervisar una guardia de 5 personas, asegurando el cumplimiento de KPIs y estándares de seguridad."
        - "Actualizar la topografía del pit de manera diaria usando GPS diferencial e impulsar la adopción progresiva de drones RTK (DJI Matrice 250/300) para levantamientos."
        - "Realizar la cubicación diaria de stocks de mineral descargados para reportar a grade control, considerando polígonos y leyes descargadas."
        - "Elaborar las conciliaciones de voladura comparando diseño vs ejecutado en metros perforados y material volado, usando Excel y Civil 3D."
        - "Realizar la comparación de taladros perforados vs diseño de malla para verificar desviaciones en campo post-perforación."
        - "Cubicación semanal de los bines con estación total para que planta evalúe abastecimiento."
        - "Elaborar planos del pit, frentes de minado, depósitos de desmonte, presa de relaves y otros requeridos para auditorías de Osinergmin y OEFA."
        - "Coordinar con planeamiento, operaciones, geología, grade control, geotecnia, planta y presa para asegurar el cumplimiento de los planes programados."
        - "Preparar el cierre mensual: material acarreado desde el pit, descargas en depósitos de desmonte, mineral marginal en stocks, bolas de acero en molinos SAG y de bolas, stock en los fingers del Rompad."
      achievements:
        - "Creación de un reporte de control de pisos para stocks y botaderos en Power BI — no existía previamente, integrando topografía y puntos de medición con cotas para identificar zonas de corte, relleno y piso nivelado."
        - "Asunción de liderazgo completo de guardia en la segunda rotación, tras solo 3 días de inducción, demostrando rápida adaptación operativa."
        - "Ejecución de cierres mensuales de manera autónoma, coordinando con todas las áreas involucradas."
        - "Impulso en la adopción de drones RTK para levantamientos topográficos, complementando el trabajo tradicional con GPS diferencial."
      attachment: ""

- company: "Newmont Yanacocha – Divino Salvador S.A."
  logo: "/assets/cv/logos/divino-salvador.png"
  location: "Cajamarca, Perú"
  positions:
    - title: "Asistente de supervisión"
      start: "mar 2023"
      end: "set 2023"
      description: "Supervisión del equipo en el CIP Cerro Negro (Centro de Investigación Experimental), proyecto de cierre de minas de Newmont Yanacocha enfocado en rehabilitación de terrenos, revegetación y producción de investigación aplicada al cierre minero."
      responsibilities:
        - "Supervisar a 18 personas en el cumplimiento del plan de trabajo diario y los estándares HSE (Health, Safety & Environment) de Newmont Yanacocha."
        - "Liderar las charlas de seguridad diarias y las reuniones previas al inicio de labores para coordinar las actividades del día."
        - "Controlar el avance del proyecto contra el presupuesto aprobado, reportando mensualmente la ejecución mediante curva S para evaluar el cumplimiento del plan."
        - "Elaborar informes diarios de producción y avance para reportar al sponsor del titular minero."
        - "Supervisar las actividades de rehabilitación de terreno: cosecha de semillas, preparación del vivero, siembra y revegetación de áreas impactadas."
        - "Liderar y coredactar artículos de investigación aplicada al cierre de minas, materializando los resultados experimentales del CIP Cerro Negro."
        - "Asistir a las reuniones de integración de especialistas HSE de Newmont Yanacocha y empresas contratistas para alineamiento en estándares de seguridad."
        - "Recibir y guiar delegaciones de visitantes (comunidades, instituciones, universidades) al CIP Cerro Negro, explicando las operaciones de cierre e investigación — al menos 2 visitas semanales."
      achievements:
        - "Publicación de 2 artículos de investigación: 'Efecto de dos fuentes nitrogenadas en la variación del pH del suelo' y 'Efecto de abonamiento orgánico con compost, guano de aves, gallinaza y tratamiento sin abono'."
        - "Diseño y puesta en marcha de 2 investigaciones adicionales que continuaron tras mi salida: evaluación de desarrollo radicular en material de tajo y evaluación de velocidad de crecimiento de especies introducidas para revegetación."
        - "Implementación de un sistema de control de avance diario que no existía previamente, mejorando la trazabilidad y el reporte de actividades."
        - "Gestión de seguridad sin incidentes reportables durante todo el periodo de supervisión."
      attachment: ""

