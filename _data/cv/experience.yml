# experience.yml — Experiencia laboral agrupada por empresa (estilo LinkedIn)
# Cada posición tiene: description, responsibilities, achievements, attachment

- company: "CODEa UNI"
  logo: "/assets/cv/logos/codea-uni.jpg"
  location: "Perú"
  positions:
    - title: "Jefe de proyectos"
      start: "oct 2023"
      end: "actualidad"
      description: "Gestión integral de las operaciones de CODEa UNI, liderando un equipo de 16 personas (14 reportes directos) en 6 áreas: desarrollo, marketing, ventas, operaciones académicas, proyectos e ingeniería de campo. Responsable de la estrategia operativa, crecimiento comercial, desarrollo de productos digitales y relación con clientes del sector minero."
      responsibilities:
        - "Dirigir las operaciones de 6 áreas funcionales (desarrollo, marketing, ventas, operaciones académicas, proyectos e ingeniería de campo) con 14 reportes directos."
        - "Gestionar el ciclo completo de programas educativos: cursos, especializaciones y bootcamps orientados a tecnología aplicada a minería."
        - "Liderar la relación comercial con clientes del sector minero, incluyendo prospección, propuestas técnico-comerciales y licitaciones."
        - "Concebir, diseñar y liderar el desarrollo de 3 plataformas digitales propias: Meta Mining Media (gestión de marketing digital con agentes de IA), HeadHunting for Mining (reclutamiento especializado para minería) y English for Mining (plataforma de inglés técnico con metodología ESP e IA integrada)."
        - "Definir estrategias de marca y marketing digital, supervisando la creación de contenido y la presencia en redes sociales."
        - "Formular y ejecutar la gestión ante instituciones públicas para oficializaciones, fondos concursables y acreditaciones."
        - "Crear y dirigir el Programa de Embajadores CODEa: programa de becas para estudiantes destacados de minería enfocado en desarrollo de talento en tecnología."
        - "Supervisar el desarrollo de dashboards, reportes automatizados y herramientas de análisis con Power BI, Python y Excel avanzado."
        - "Gestionar la planificación, presupuesto y seguimiento de todos los proyectos mediante indicadores y KPIs."
      achievements:
        - "Crecimiento del equipo de 3 a 16 personas, con oficina propia en San Isidro (Lima) y operación rentable."
        - "Ganador del Startup Perú 11G de ProInnovate (Ministerio de la Producción) — gestión completa del proceso."
        - "Ganador de Acelera 3G de Incuba UNT — programa de aceleración empresarial."
        - "Oficialización de bootcamps de Minería y Metalurgia por el Ministerio de Energía y Minas (MINEM)."
        - "Oficialización del CODEa Mining Fest por el MINEM — evento propio de tecnología aplicada a minería."
        - "Crecimiento de redes sociales de 0 a 15,000+ seguidores."
        - "Licitación ganada con Rio Tinto Mining and Exploration (Proyecto Mara) — gestión comercial y técnica integral."
        - "Despliegue de 3 plataformas digitales propias: Meta Mining Media, HeadHunting for Mining y English for Mining."
        - "Creación de la línea de servicios de ingeniería de campo (operaciones con drones) a partir de demanda del mercado."
      attachment: ""

    - title: "Líder de Auditoría y Reconciliación de Mineral – Chinalco (Proyecto Toromocho)"
      start: "feb 2026"
      end: "abr 2026"
      description: "Liderazgo de las capas de auditoría y reconciliación de mineral en el Proyecto Toromocho (Chinalco), en alianza con Geoperuvian. Integración de datos GPS de palas y camiones con modelos de bloques y el sistema de despacho Minestar para identificar pérdidas de mineral y generar ratios de reconciliación reportables en Power BI."
      responsibilities:
        - "Liderar la capa de auditoría de mineral: integrar datos GPS de la cuchara de la pala y GPS del camión para identificar origen, recorrido y descarga de material, detectando patrones anómalos (ej: mineral con destino a planta que termina en botadero)."
        - "Contrastar la data de trayectorias GPS con el modelo de bloques y los registros del sistema de despacho Minestar para validar la trazabilidad del mineral."
        - "Liderar la capa de reconciliación de mineral: tomar los 3 modelos de bloques (corto, mediano y largo plazo), topografías de corte mensual y generar sólidos de intersección para calcular 8 ratios de reconciliación."
        - "Diseñar e implementar la arquitectura de datos: almacenamiento en base de datos, conexión con Power BI y generación de reportes automáticos."
        - "Coordinar con Geoperuvian (responsables de la parte técnica/geológica) la integración de datos y la validación cruzada de resultados."
      achievements:
        - "Implementación de un sistema de auditoría espacial de mineral que permite detectar pérdidas de material en tiempo real."
        - "Generación de 8 ratios de reconciliación estandarizados, conectados a base de datos y reportados automáticamente en Power BI."
      attachment: ""

    - title: "Piloto de Dron – Mina Reliquias (Silver Mountain Resources)"
      start: "oct 2025"
      end: "ene 2026"
      description: "Operación autónoma de dron DJI Matrice 4 Enterprise a más de 4,500 msnm en la Mina Reliquias (Huancavelica), documentando la evolución constructiva de infraestructura crítica para Silver Mountain Resources: presa de relaves, planta de tratamiento de aguas, campamento, planta de procesamiento de minerales e interior mina."
      responsibilities:
        - "Planificar, coordinar y ejecutar vuelos con DJI Matrice 4 Enterprise para registro fotográfico y videográfico del avance de obra en todas las instalaciones del proyecto."
        - "Elaborar planes de vuelo considerando la altitud extrema (+4,500 msnm), condiciones climáticas y restricciones operativas de la mina."
        - "Documentar la evolución constructiva de la presa de relaves, planta de tratamiento de aguas, planta de procesamiento y campamento."
        - "Ejecutar operaciones de captura en bocamina e interior mina con DJI Pocket 3 para registro visual complementario."
        - "Gestionar la seguridad operativa de todas las operaciones con dron, garantizando el cumplimiento de protocolos de la unidad minera."
        - "Coordinar con el equipo en campo y con los responsables de obra para la planificación de accesos, horarios y zonas de vuelo."
        - "Organizar, clasificar y entregar registros audiovisuales georreferenciados para reportes técnicos y presentaciones ejecutivas."
      achievements:
        - "Ejecución exitosa de operaciones de dron en condiciones extremas de altitud (+4,500 msnm) sin incidentes de seguridad."
        - "Generación de registro completo de la evolución constructiva del proyecto, utilizado como evidencia para el seguimiento y toma de decisiones del cliente."
        - "Gestión integral del proyecto como piloto responsable: planificación, ejecución, seguridad y entrega de resultados."
      attachment: ""

    - title: "Supervisor RPAS – Proyecto Mara (Rio Tinto Mining and Exploration)"
      start: "may 2025"
      end: "jun 2025"
      description: "Supervisión y gestión de operaciones con dron Elios 3 (Flyability) para inspección y mapeo LiDAR de labores subterráneas artesanales en el Proyecto Mara, un greenfield de exploración de cobre de Rio Tinto ubicado en la provincia de Cotabambas, Apurímac."
      responsibilities:
        - "Liderar un equipo de 4 personas (piloto, asistente de piloto, topógrafo y supervisor) en operaciones de inspección subterránea con dron."
        - "Formular y ejecutar el plan de trabajo para el mapeo de labores subterráneas, definiendo alcance, cronograma, protocolos de seguridad y procedimientos operativos."
        - "Supervisar la ejecución segura de vuelos con Elios 3 en labores artesanales donde, por restricciones de seguridad, no se permitió el ingreso de personal."
        - "Gestionar los desafíos de conectividad y telemetría en labores subterráneas, optimizando el alcance de mapeo desde las bocaminas."
        - "Coordinar con Rio Tinto la logística de campo, permisos de acceso, recursos y planificación de operaciones en un entorno de exploración greenfield."
        - "Supervisar el procesamiento de datos LiDAR con el software Flyability (Inspector) para generar nubes de puntos y ortomosaicos georreferenciados."
      achievements:
        - "Mapeo exitoso de 3 labores subterráneas artesanales mediante inspección remota con dron, sin exposición de personal a riesgos de ingreso."
        - "Generación de nubes de puntos 3D y ortomosaicos georreferenciados que permitieron a Rio Tinto evaluar el estado de las labores sin acceso físico."
        - "Superación de desafíos técnicos de conectividad en labores artesanales, maximizando el alcance de mapeo desde bocamina."
        - "Cumplimiento del 100% del plan de trabajo formulado, en tiempo y dentro de los estándares de seguridad de Rio Tinto."
      attachment: ""

