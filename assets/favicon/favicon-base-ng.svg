<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0068FF"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background with gradient -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="96" fill="url(#shine)"/>

  <!-- Letters "NG" -->
  <text x="256" y="310" font-family="Inter, Montserrat, -apple-system, sans-serif" font-size="220" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-8">NG</text>
</svg>