<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#0F2847"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0068FF"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <linearGradient id="accent-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0068FF"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative gradient circle (top right) -->
  <circle cx="1050" cy="100" r="250" fill="#0068FF" opacity="0.08"/>
  <circle cx="1100" cy="500" r="180" fill="#00D2FF" opacity="0.06"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- NG badge (left side) -->
  <rect x="80" y="180" width="100" height="100" rx="20" fill="url(#accent)"/>
  <text x="130" y="248" font-family="Inter, Montserrat, sans-serif" font-size="44" font-weight="800" fill="white" text-anchor="middle">NG</text>

  <!-- Name -->
  <text x="210" y="225" font-family="Inter, Montserrat, sans-serif" font-size="42" font-weight="800" fill="white">Nilson Rolando Garrido Asenjo</text>

  <!-- Role -->
  <text x="210" y="268" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#00B4FF">Mining Engineer · Data Analyst</text>

  <!-- Divider -->
  <rect x="80" y="310" width="80" height="3" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="365" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="white">Construyo soluciones</text>
  <text x="420" y="365" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#00D2FF"> data-driven</text>
  <text x="80" y="405" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="white">para la industria minera</text>

  <!-- Stack pills -->
  <rect x="80" y="440" width="90" height="30" rx="8" fill="rgba(0,104,255,0.15)" stroke="#0068FF" stroke-width="1"/>
  <text x="125" y="460" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#00B4FF" text-anchor="middle">Power BI</text>

  <rect x="185" y="440" width="75" height="30" rx="8" fill="rgba(0,104,255,0.15)" stroke="#0068FF" stroke-width="1"/>
  <text x="222" y="460" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#00B4FF" text-anchor="middle">Python</text>

  <rect x="275" y="440" width="80" height="30" rx="8" fill="rgba(0,104,255,0.15)" stroke="#0068FF" stroke-width="1"/>
  <text x="315" y="460" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#00B4FF" text-anchor="middle">Tableau</text>

  <rect x="370" y="440" width="55" height="30" rx="8" fill="rgba(0,104,255,0.15)" stroke="#0068FF" stroke-width="1"/>
  <text x="397" y="460" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#00B4FF" text-anchor="middle">ML</text>

  <rect x="440" y="440" width="60" height="30" rx="8" fill="rgba(0,104,255,0.15)" stroke="#0068FF" stroke-width="1"/>
  <text x="470" y="460" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#00B4FF" text-anchor="middle">Excel</text>

  <rect x="515" y="440" width="75" height="30" rx="8" fill="rgba(0,104,255,0.15)" stroke="#0068FF" stroke-width="1"/>
  <text x="552" y="460" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#00B4FF" text-anchor="middle">Drones</text>

  <!-- URL bottom -->
  <text x="80" y="570" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.4)">nrgarridoa.github.io</text>

  <!-- Accent line bottom -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>